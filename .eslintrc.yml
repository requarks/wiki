extends:
  - requarks
  - plugin:vue/strongly-recommended
  - plugin:cypress/recommended
env:
  node: true
  jest: true
parserOptions:
  parser: '@babel/eslint-parser'
  ecmaVersion: 2017
  allowImportExportEverywhere: true
  requireConfigFile: false
globals:
  document: false
  navigator: false
  window: false
