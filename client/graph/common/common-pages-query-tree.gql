query (
  $path: String
  $mode: PageTreeMode!
  $locale: String!
  $includeAncestors: Boolean!
  $siteId: String!
) {
  tree(
    path: $path
    mode: $mode
    locale: $locale
    includeAncestors: $includeAncestors
    siteId: $siteId
  ) {
    id
    path
    title
    isFolder
    pageId
    parent
    locale
    siteId
  }
}
