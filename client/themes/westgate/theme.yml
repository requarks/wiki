name: Westgate
author: vickydotbat
site: https://wiki.westgate.pw/
version: 1.0.0
requirements:
  minimum: '>= 2.0.0'
  maximum: '< 3.0.0'
props:
  tocPosition:
    type: String
    title: Table of Contents Position
    hint: Select whether the table of contents is shown on the left, right or not at all.
    order: 1
    default: left
    enum:
      - left
      - right
      - off
  showTOC:
    type: Boolean
    default: true
    title: Display the Table of Contents
    order: 2
  showTags:
    type: Boolean
    default: true
    title: Display the Page Tags
    order: 3
  showAuthor:
    type: Boolean
    default: true
    title: Display the Page Author and Date
    order: 4
  showRating:
    type: Boolean
    default: true
    title: Display the Page Rating
    order: 5
  showSocialBar:
    type: Boolean
    default: true
    title: Display the Social Links Bar
    order: 6
  showEditSpeedDial:
    type: Boolean
    default: true
    title: Display the Edit Speed Dial
    hint: Shown in the lower right corner of the page.
    order: 7
