# -- DEV DOCKER-COMPOSE to install POSTGRESQL --
# -- for local development only --

services:
  db:
    container_name: capwiki-local-db
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: wiki
      POSTGRES_PASSWORD: wikijsrocks
      POSTGRES_USER: wikijs
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
      
  drawio:
    container_name: capwiki-local-drawio  
    image: jgraph/drawio:12.4.8
    ports:
      - "8097:8080"
      - "8443:8443"
    networks:
      - app_network
      
  maildev:
    image: maildev/maildev
    restart: always
    ports:
      - "1080:1080"  # Web interface
      - "1025:1025"  # SMTP server
    environment:
      - MAILDEV_WEB_PORT=1080
      - MAILDEV_SMTP_PORT=1025
    volumes:
      - maildev_data:/data
  
  pandoc:
    container_name: capwiki-local-pandoc
    build:
      context: ./dev/pandoc
    # Expose Pandoc conversion API (gunicorn binds to container port 80)
    ports:
      - "8090:80"
    environment:
      # These env vars allow overriding paths if needed
      TEMPLATE_PATH: /app/template.tex
      REFERENCE_DOC_PATH: /app/reference.docx
      OUTPUT_DIR: /app
      # Not used when running under gunicorn (port fixed by -b), kept for consistency
      PANDOC_PORT: 8090
    networks:
      - app_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "sh", "-c", "echo '<p>x</p>' > /tmp/h.html && curl -s -o /dev/null -w '%{http_code}' -F file=@/tmp/h.html http://localhost/convert-to-pdf | grep -q 200"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
#    ports:
#      - "80:80"

volumes:
  db-data:

  maildev_data:  

networks:
  app_network:
    driver: bridge