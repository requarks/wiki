# -- DEV DOCKER-COMPOSE to install POSTGRESQL --
# -- for local development only --

services:
  db:
    container_name: capwiki-local-db
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: wiki
      POSTGRES_PASSWORD: wikijsrocks
      POSTGRES_USER: wikijs
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
      
  drawio:
    container_name: capwiki-local-drawio  
    image: jgraph/drawio:12.4.8
    ports:
      - "8097:8080"
      - "8443:8443"
    networks:
      - app_network
      
  maildev:
    image: maildev/maildev
    restart: always
    ports:
      - "1080:1080"  # Web interface
      - "1025:1025"  # SMTP server
    environment:
      - MAILDEV_WEB_PORT=1080
      - MAILDEV_SMTP_PORT=1025
    volumes:
      - maildev_data:/data
      
      
#  pandoc:
#    container_name: capwiki-local-pandoc
#    image: pandoc:latest
#    ports:
#      - "80:80"

volumes:
  db-data:

  maildev_data:  

networks:
  app_network:
    driver: bridge