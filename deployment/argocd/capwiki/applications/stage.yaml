apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  annotations:
    argocd-image-updater.argoproj.io/capwiki.helm.image-name: capwiki.image.repository
    argocd-image-updater.argoproj.io/capwiki.helm.image-tag: capwiki.image.tag
    argocd-image-updater.argoproj.io/capwiki.pull-secret: pullsecret:argocd/capwiki-nexus-registry
    argocd-image-updater.argoproj.io/capwiki.update-strategy: digest
    argocd-image-updater.argoproj.io/image-list: capwiki=docker-registry-pt-support-shared.pl.s2-eu.capgemini.com/mar/capwiki:latest-staging
  name: capwiki
  namespace: argocd
spec:
  destination:
    namespace: capwiki
    server: https://kubernetes.default.svc
  project: capwiki
  source:
    kustomize:
      namespace: capwiki
    path: manifests/stage
    repoURL: https://pt-support-shared.pl.s2-eu.capgemini.com/gitlab/tpo-bu-germany/CapWiki/capwiki-deployment.git
    targetRevision: main
  syncPolicy:
    automated: {}
    syncOptions:
    - CreateNamespace=true