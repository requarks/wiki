apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: capwiki-ingress
spec:
  rules:
  - host: account2-capwiki.corp.capgemini.com
    http:
      paths:
      - backend:
          service:
            name: capwiki-svc
            port:
              number: 80
        path: /
        pathType: Prefix
  tls:
  - hosts:
    - account2-capwiki.corp.capgemini.com
    secretName: account-capwiki-internal-tls
