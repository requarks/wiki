# ===============================================
# THEMES
# ===============================================

extend type Query {
  themes: [ThemingTheme] @auth(requires: ["manage:theme", "manage:system"])
  themingConfig: ThemingConfig
    @auth(requires: ["manage:theme", "manage:system"])
}

extend type Mutation {
  theming: ThemingMutation
}

# -----------------------------------------------
# MUTATIONS
# -----------------------------------------------

type ThemingMutation {
  setConfig(
    theme: String!
    iconset: String!
    darkMode: Boolean!
    tocPosition: String
    injectCSS: String
    injectHead: String
    injectBody: String
  ): DefaultResponse @auth(requires: ["manage:theme", "manage:system"])
}

# -----------------------------------------------
# TYPES
# -----------------------------------------------

type ThemingConfig {
  theme: String!
  iconset: String!
  darkMode: Boolean!
  tocPosition: String
  injectCSS: String
  injectHead: String
  injectBody: String
}

type ThemingTheme {
  key: String
  title: String
  author: String
}
