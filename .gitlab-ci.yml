variables:
  PROJECT_NAME: 'mar'
  ENVIRONMENT:
    value: "dev1"
    options:
      - "dev1"
    description: "Choose dev1 environment for custom branch deployment (only available for manual pipeline runs)"
  APP_NAME: 'capwiki'
  DOCKER_REGISTRY: 'docker-registry-pt-support-shared.pl.s2-eu.capgemini.com'
  DEPLOY_USER: 'capwiki'
  TARGET_DIR: "/home/${DEPLOY_USER}/${PROJECT_NAME}"
  IMAGE: '${DOCKER_REGISTRY}/${PROJECT_NAME}/${APP_NAME}'
  PANDOC_IMAGE: '${DOCKER_REGISTRY}/${PROJECT_NAME}/pandoc'
  NODE_IMAGE: '${DOCKER_REGISTRY}/${PROJECT_NAME}/node:20-alpine'
  DEV2_IMAGE_TAG: "dev2-${VERSION}"
  STAGING_IMAGE_TAG: "latest-staging"
  PRODUCTION_IMAGE_TAG: "${VERSION}"
  STAGING_IMAGE: "${IMAGE}:latest-staging"
  ALLOWED_BRANCH_PREFIXES: '/^(feature|task|hotfix|improvement|bugfix|docs)\/'
  GIT_DEPTH: "0"


  IMAGE_TAG:
    value: ""
    description: "Specify the image tag for dev, use MAR-<Jira-ticket-nr> for staging (ignore i.e has default value latest-staging), for prod, use tags ex. 1.0.0 etc"

  SONARQUBE:
    value: "true"
    options:
      - "true"
      - "false"
    description: "Choose false to skip code quality check"

  PANDOC:
    value: "false"
    options:
      - "true"
      - "false"
    description: "Choose false to skip build & push pandoc docker image stages"

  VERSION:
    value: "1.9.4" # hotfix release
    description: "Release version (e.g., 1.9.3, 1.9.4). Always increment by one for any new release, including hotfixes. Developer must update manually before merging to main."

default:
  tags:
    - ubuntu-docker
  before_script:
     - apt-get update && apt-get install -y nodejs npm
     - source scripts/setup_yarn.sh
stages:
  - environment-set
  - build
  - test
  - sonarqube
  - docker-build
  - docker-push #when this stage "docker push image" is success then argocd will do pull strategy to automate k8s cluster deployment based on docker image tag value
  - promote-prod-release-version # promote to production


environment-set:
  stage: environment-set
  script:
    - echo "environment used for this pipeline is ${ENVIRONMENT}"
  # Run only on the following branches when there are commits (not just branch creation)
  rules:
    - if: '$CI_COMMIT_BRANCH =~ /^(feature|task|improvement|docs)\// && $CI_PIPELINE_SOURCE == "push"'
      when: always
    - if: '$CI_COMMIT_BRANCH =~ /^(hotfix|bugfix)\// && $CI_PIPELINE_SOURCE == "push"'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "web" && $ENVIRONMENT == "dev1"'
      when: always


build:
  stage: build
  before_script:
    - docker login -u "$DOCKER_REGISTRY_USER" -p "$DOCKER_REGISTRY_PASS" "$DOCKER_REGISTRY"
  script:
    - export BUILD_IMAGE="codebase-build:$CI_COMMIT_SHORT_SHA"
    - echo "NODE_IMAGE is $NODE_IMAGE"
    - docker image inspect "$NODE_IMAGE" > /dev/null 2>&1 || docker pull "$NODE_IMAGE"
    - docker build --no-cache -f Dockerfile.build --build-arg NODE_IMAGE="$NODE_IMAGE" -t $BUILD_IMAGE .
    - docker run --rm -v $(pwd)/assets:/wiki/assets $BUILD_IMAGE
    - docker rmi $BUILD_IMAGE || true
  artifacts:
    paths:
      - assets/
    expire_in: 1 hour
  rules:
    - if: '$CI_COMMIT_BRANCH =~ /^(feature|task|improvement|docs)\// && $CI_PIPELINE_SOURCE == "push"'
      when: always
    - if: '$CI_COMMIT_BRANCH =~ /^(hotfix|bugfix)\// && $CI_PIPELINE_SOURCE == "push"'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "web" && $ENVIRONMENT == "dev1"'
      when: always

test:
  stage: test
  dependencies:
    - build
  before_script:
    - docker login -u "$DOCKER_REGISTRY_USER" -p "$DOCKER_REGISTRY_PASS" "$DOCKER_REGISTRY"
    - export TEST_IMAGE="codebase-test:$CI_COMMIT_SHORT_SHA"
    - docker build --no-cache -f Dockerfile.test --build-arg NODE_IMAGE="$NODE_IMAGE" -t $TEST_IMAGE .
  script:
    - docker run --rm -v $CI_PROJECT_DIR/coverage:/wiki/coverage $TEST_IMAGE
    - docker rmi $TEST_IMAGE || true
  artifacts:
    expire_in: 1 hour
    when: on_success
    paths:
      - coverage
  rules:
    - if: '$CI_COMMIT_BRANCH =~ /^(feature|task|improvement|docs)\// && $CI_PIPELINE_SOURCE == "push"'
      when: on_success
    - if: '$CI_COMMIT_BRANCH =~ /^(hotfix|bugfix)\// && $CI_PIPELINE_SOURCE == "push"'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "web" && $ENVIRONMENT == "dev1"'
      when: on_success


sonarqube-scan:
  stage: sonarqube
  dependencies:
    - test
  tags:
    - docker_runner
  image:
    name: sonarsource/sonar-scanner-cli:latest
    entrypoint: [""]
  variables:
    SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
  cache:
    key: "${CI_JOB_NAME}"
    paths:
      - .sonar/cache
  script:
    - sonar-scanner
  # Run on feature branches only when there are commits
  rules:
    - if: '$CI_COMMIT_BRANCH =~ /^(feature|task|improvement|docs)\// && $CI_PIPELINE_SOURCE == "push"'
      when: always
    - if: '$CI_COMMIT_BRANCH =~ /^(hotfix|bugfix)\// && $CI_PIPELINE_SOURCE == "push"'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "web" && $ENVIRONMENT == "dev1"'
      when: always

docker-build:
  stage: docker-build
  before_script:
    - df -h
    - export PANDOC="$PANDOC"
    - |
        # For main branch, treat only develop->main as regular release.
        # Any other main change (hotfix/task/cherrypick/direct) is handled as candidate build from main commit.
        if [ "$CI_COMMIT_BRANCH" = "main" ]; then
          if echo "$CI_COMMIT_TITLE" | grep -qE "^Merge branch 'develop' into 'main'$"; then
            echo "Regular main merge from develop detected - skipping build (will promote dev-latest in deploy-to-staging)"
            exit 0
          else
            echo "Main change not from develop->main - building candidate image from main commit for staging"
            export ENVIRONMENT="dev1"
            export IMAGE_TAG="hotfix-$CI_COMMIT_SHORT_SHA"
          fi
        elif [ "$CI_PIPELINE_SOURCE" = "web" ] && [ "$ENVIRONMENT" = "dev1" ]; then
          # Manual trigger with dev1 - keep it
          export ENVIRONMENT="dev1"
        elif [ "$CI_COMMIT_BRANCH" = "develop" ]; then
          # Automatic push to develop branch
          export ENVIRONMENT="dev2"
        else
          echo "ERROR: Could not determine ENVIRONMENT for branch $CI_COMMIT_BRANCH" >&2
          exit 1
        fi
    - echo "Building with ENVIRONMENT=$ENVIRONMENT"
    - bash scripts/set_image_tag.sh "$ENVIRONMENT" "$IMAGE_TAG" "$VERSION"
  script:
    - bash scripts/build_images.sh
    - |
      if [ -f newimage.txt ]; then
        echo "BUILT_IMAGE_TAG=$(cat newimage.txt | grep -o 'dev2-[^[:space:]]*' | head -1 | sed 's/.*://')" >> build.env
      fi
    - echo "VERSION=$VERSION" >> build.env
  artifacts:
    paths:
      - newimage.txt
    reports:
      dotenv: build.env
    expire_in: 15 days
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web" && $ENVIRONMENT == "dev1"'
      when: always
    - if: $CI_COMMIT_BRANCH == "develop"
      when: always
    - if: $CI_COMMIT_BRANCH == "main"
      when: always



#  Docker image push to registry
push-docker-image:
  stage: docker-push
  needs:
  - job: docker-build
    artifacts: true
    optional: true
  before_script:
      - |
          # For main branch, treat only develop->main as regular release.
          # Any other main change (hotfix/task/cherrypick/direct) is handled as candidate push from main commit.
          if [ "$CI_COMMIT_BRANCH" = "main" ]; then
            if echo "$CI_COMMIT_TITLE" | grep -qE "^Merge branch 'develop' into 'main'$"; then
              echo "Regular main merge from develop detected - skipping push (will promote dev-latest in deploy-to-staging)"
              exit 0
            else
              echo "Main change not from develop->main - pushing candidate image for staging"
              export ENVIRONMENT="dev1"
              export IMAGE_TAG="hotfix-$CI_COMMIT_SHORT_SHA"
            fi
          elif [ "$CI_PIPELINE_SOURCE" = "web" ] && [ "$ENVIRONMENT" = "dev1" ]; then
            # Manual trigger with dev1 - keep it
            export ENVIRONMENT="dev1"
          elif [ "$CI_COMMIT_BRANCH" = "develop" ]; then
            # Automatic push to develop branch
            export ENVIRONMENT="dev2"
          else
            echo "ERROR: Could not determine ENVIRONMENT for branch $CI_COMMIT_BRANCH" >&2
            exit 1
          fi
          if [ -z "$IMAGE_TAG" ]; then
            export IMAGE_TAG="${ENVIRONMENT}-$CI_COMMIT_SHORT_SHA"
          fi
      - echo "Using ENVIRONMENT=$ENVIRONMENT"
      - echo "Using VERSION=$VERSION"
      - echo "Using IMAGE_TAG=$IMAGE_TAG"
      - export PANDOC="$PANDOC"
  script:
     - 'if [ -z "$VERSION" ]; then echo "ERROR: VERSION is not set!"; exit 1; fi'
     - |
         source newimage.txt
         if echo "$NEW_IMAGE" | grep -Eq ':[0-9]+\.[0-9]+\.[0-9]+$'; then
           echo "ERROR: Blocking semver image push in CI build/push stage. Production version tags must be pushed only by manual deploy-to-production job."
           exit 1
         fi
     - "bash scripts/push_images.sh --no-cleanup"
     - |
         if [ "$ENVIRONMENT" = "dev2" ]; then
           docker tag "$IMAGE:$IMAGE_TAG" "$IMAGE:dev-latest"
           docker login -u "$DOCKER_REGISTRY_USER" -p "$DOCKER_REGISTRY_PASS" "$DOCKER_REGISTRY"
           docker push "$IMAGE:dev-latest"
           docker rmi "$IMAGE:dev-latest" || true
         fi
     - "docker rmi \"$IMAGE:$IMAGE_TAG\" || true"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web" && $ENVIRONMENT == "dev1"'
      when: on_success
    - if: $CI_COMMIT_BRANCH == "develop"
      when: on_success
    - if: $CI_COMMIT_BRANCH == "main"
      when: on_success



# Promote dev2 image to staging OR promote hotfix image to staging
deploy-to-staging:
  stage: promote-prod-release-version
  needs:
    - job: docker-build
      artifacts: true
      optional: true
  before_script:
     - "if [ -f build.env ]; then source build.env; fi"
     - "echo 'Using VERSION: $VERSION'"
  script:
    - |
      # Only develop->main uses dev-latest promotion.
      # Any other main change promotes candidate image built from main commit.
      if echo "$CI_COMMIT_TITLE" | grep -qE "^Merge branch 'develop' into 'main'$"; then
        echo "Regular main merge - promoting dev-latest to staging..."
        bash scripts/promote_to_staging.sh
      else
        echo "Main change not from develop->main - promoting candidate image to staging..."
        docker login -u "$DOCKER_REGISTRY_USER" -p "$DOCKER_REGISTRY_PASS" "$DOCKER_REGISTRY"
        STAGING_TAG="latest-staging"
        HOTFIX_CANDIDATE_TAG="dev1-hotfix-$CI_COMMIT_SHORT_SHA"
        if ! docker manifest inspect "$IMAGE:$HOTFIX_CANDIDATE_TAG" > /dev/null 2>&1; then
          echo "ERROR: Expected candidate image $IMAGE:$HOTFIX_CANDIDATE_TAG is missing."
          echo "ERROR: For main changes that are not develop->main, promotion from dev-latest is forbidden."
          echo "ERROR: Ensure docker-build and push-docker-image produced and pushed the candidate tag first."
          exit 1
        fi
        docker pull "$IMAGE:$HOTFIX_CANDIDATE_TAG"
        docker tag "$IMAGE:$HOTFIX_CANDIDATE_TAG" "$IMAGE:$STAGING_TAG"
        docker push "$IMAGE:$STAGING_TAG"
      fi
  environment:
    name: staging
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: always


deploy-to-production:
  stage: promote-prod-release-version
  needs:
    - job: docker-build
      artifacts: true
      optional: true
  before_script:
     - "if [ -f build.env ]; then source build.env; fi"
     - "echo 'Using VERSION: $VERSION'"
  script:
    - |
      if echo "$CI_COMMIT_TITLE" | grep -qE "^Merge branch 'develop' into 'main'$"; then
        echo "Regular deployment - promoting staging to production with version $VERSION"
      else
        echo "Main change not from develop->main - manual production promotion with version $VERSION"
      fi
    - echo 'Promoting staging image to production...'
    - bash scripts/promote_to_prod.sh
  environment:
    name: production
  rules:
    # Manual for all main merges (including hotfixes) - safer approach
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
