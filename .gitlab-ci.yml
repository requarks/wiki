variables:
  PROJECT_NAME: 'mar'
  APP_NAME: 'capwiki'
  DOCKER_REGISTRY: 'docker-registry-pt-support-shared.pl.s2-eu.capgemini.com'
  DEPLOY_USER: 'capwiki'
  TARGET_DIR: "/home/${DEPLOY_USER}/${PROJECT_NAME}"
  IMAGE: '${DOCKER_REGISTRY}/${PROJECT_NAME}/${APP_NAME}'
  PANDOC_IMAGE: '${DOCKER_REGISTRY}/${PROJECT_NAME}/pandoc'
  STAGING_IMAGE_TAG: 'latest-staging'
  STAGING_IMAGE: "${IMAGE}:${STAGING_IMAGE_TAG}"
  ALLOWED_BRANCH_PREFIXES: '/^(feature|task|hotfix|improvement|bugfix|docs)\//'

  ENVIRONMENT:
    value: "none"
    options:
      - "none"
      - "dev1"
      - "dev2"
      - "staging"
      - "production"
    description: "Choose on which environment should pipeline run"

  IMAGE_TAG:
    value: ""
    description: "Specify the image tag for dev, use MAR-<Jira-ticket-nr> for staging (ignore i.e has default value latest-staging), for prod, use tags ex. 1.0.0 etc"

  SONARQUBE:
    value: "true"
    options:
      - "true"
      - "false"
    description: "Choose false to skip code quality check"

  PANDOC:
    value: "true"
    options:
      - "true"
      - "false"
    description: "Choose false to skip build & push pandoc docker image stages"

  VERSION:
     value: "1.3.0"
     description: "Update to next release version, it should be numeric value, ex: 1.0.0"

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - node_modules/

default:
  tags:
    - runner_mar
  before_script:
     - source scripts/setup_yarn.sh
stages:
  - environment-set
  - build
  - test
  - sonarqube
  - modify-package-json #Need to remove this stage when MAR-444 task is done.
  - docker-build
  - docker-push #when this stage "docker push image" is success then argocd will do pull strategy to automate k8s cluster deployment based on docker image tag value
  - promote-prod-release-version

environment-set:
  stage: environment-set
  script:
    - echo "environment used for this pipeline is ${ENVIRONMENT}"
  environment:
    name: ${ENVIRONMENT}

build:
 stage: build
 script:
   - bash scripts/set_up_runner.sh
   - yarn install --frozen-lockfile
   - yarn build
 rules:
    - if: $CI_COMMIT_BRANCH == "main" || $ENVIRONMENT == "production"
      when: never
    - when: always

test:
  stage: test
  dependencies:
    - build
  script:
    - yarn add jest-junit --dev
    - yarn jest --coverage # Run tests
    ## Below cmnds can be run after fixing lint errors in the codebase
    #- yarn eslint --ext .js,.vue .
    # - yarn pug-lint server/views
  artifacts:
    expire_in: 1 hr
    when: on_success
    paths:
      - coverage
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $ENVIRONMENT == "production"
      when: never
    - when: on_success

sonarqube-scan:
  stage: sonarqube
  dependencies:
    - test
  tags:
    - docker_runner
  image:
    name: sonarsource/sonar-scanner-cli:latest
    entrypoint: [""]
  variables:
    SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"  # Defines the location of the analysis task cache
    GIT_DEPTH: "0"  # Tells git to fetch all the branches of the project, required by the analysis task
  cache:
    key: "${CI_JOB_NAME}"
    paths:
      - .sonar/cache
  script:
    - sonar-scanner
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $ENVIRONMENT == "production"
      when: never
    - if: $SONARQUBE == "true"
      when: on_success

docker-build:
  stage: docker-build
  before_script:
    - df -h # Check disk space before building
    - export PANDOC="$PANDOC"
    - bash scripts/set_image_tag.sh "$ENVIRONMENT" "$IMAGE_TAG"
  script:
    - bash scripts/build_images.sh
  artifacts:
    paths:
      - newimage.txt
    expire_in: 1 hour  # Expires 1 minute after the pipeline finishes
  environment:
    name: $ENVIRONMENT
    url: $NEW_IMAGE
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $ENVIRONMENT == "production"
      when: never
    - if: '$CI_COMMIT_BRANCH =~ $ALLOWED_BRANCH_PREFIXES && $CI_PIPELINE_SOURCE == "web" && ($ENVIRONMENT == "dev1" || $ENVIRONMENT == "dev2")'
      when: always
    - if: $CI_COMMIT_BRANCH == "develop" || $ENVIRONMENT == "staging"
      when: always
    - if: '$CI_COMMIT_REF_NAME =~ /^(hotfix|release)(\/.*)?$/'
      when: always


push-docker-image:
  stage: docker-push
  needs:
   - docker-build
  script:
   - export PANDOC="$PANDOC"
   - bash scripts/push_images.sh
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $ENVIRONMENT == "production"
      when: never
    - if: '$CI_COMMIT_BRANCH =~ $ALLOWED_BRANCH_PREFIXES && $CI_PIPELINE_SOURCE == "web" && ($ENVIRONMENT == "dev1" || $ENVIRONMENT == "dev2")'
      when: on_success
    - if: $CI_COMMIT_BRANCH == "develop" || $ENVIRONMENT == "staging"
      when: on_success
    - if: '$CI_COMMIT_REF_NAME =~ /^(hotfix|release)(\/.*)?$/'
      when: on_success


# only enable manual deployment for production
#@TODO There is need to be new ticket created to trigger automatic build for production when we merge develop to main with commmit message having "release" in it
promote-prod-release-version:
  stage: promote-prod-release-version
  before_script:
    - docker login -u "$DOCKER_REGISTRY_USER" -p "$DOCKER_REGISTRY_PASS" "$DOCKER_REGISTRY"
  script:
    - bash scripts/promote_to_prod.sh
  rules:
   - if: $CI_COMMIT_BRANCH == "main" || $ENVIRONMENT == "production"
     when: always

