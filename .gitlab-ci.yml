variables:
  PROJECT_NAME: 'mar'
  ENVIRONMENT:
    value: "none"
    options:
      - "none"
      - "dev1"
      - "dev2"
      - "staging"
      - "production"
    description: "Choose on which environment should pipeline run"
  APP_NAME: 'capwiki'
  DOCKER_REGISTRY: 'docker-registry-pt-support-shared.pl.s2-eu.capgemini.com'
  DEPLOY_USER: 'capwiki'
  TARGET_DIR: "/home/${DEPLOY_USER}/${PROJECT_NAME}"
  IMAGE: '${DOCKER_REGISTRY}/${PROJECT_NAME}/${APP_NAME}'
  PANDOC_IMAGE: '${DOCKER_REGISTRY}/${PROJECT_NAME}/pandoc'
  NODE_IMAGE: '${DOCKER_REGISTRY}/${PROJECT_NAME}/node:20-alpine'
  STAGING_IMAGE_TAG: 'latest-staging'
  STAGING_IMAGE: "${IMAGE}:${STAGING_IMAGE_TAG}"
  ALLOWED_BRANCH_PREFIXES: '/^(feature|task|hotfix|improvement|bugfix|docs)\//'


  IMAGE_TAG:
    value: ""
    description: "Specify the image tag for dev, use MAR-<Jira-ticket-nr> for staging (ignore i.e has default value latest-staging), for prod, use tags ex. 1.0.0 etc"

  DEV2_IMAGE_TAG_OVERRIDE:
    value: ""
    description: "Specify the dev2 image tag to promote to staging (e.g., dev2-caefcfeb). Required when merging to main."

  SONARQUBE:
    value: "true"
    options:
      - "true"
      - "false"
    description: "Choose false to skip code quality check"

  PANDOC:
    value: "false"
    options:
      - "true"
      - "false"
    description: "Choose false to skip build & push pandoc docker image stages"

  VERSION:
     value: ""
     description: "Update to next release version, it should be numeric value, ex: 1.7.5"

default:
  tags:
    - ubuntu-docker 
  before_script:
     - apt-get update && apt-get install -y nodejs npm
     - source scripts/setup_yarn.sh
stages:
  - environment-set
  - build
  - test
  - sonarqube
  - docker-build
  - docker-push #when this stage "docker push image" is success then argocd will do pull strategy to automate k8s cluster deployment based on docker image tag value
  - promote-prod-release-version


environment-set:
  stage: environment-set
  script:
    - echo "environment used for this pipeline is ${ENVIRONMENT}"
  environment:
    name: ${ENVIRONMENT}
  # Run only on the following branches when there are commits (not just branch creation)
  rules:
    - if: '$CI_COMMIT_BRANCH =~ /^(feature|task|hotfix|improvement|bugfix|docs)\// && $CI_PIPELINE_SOURCE == "push"'
      when: always
    - if: '$CI_PIPELINE_SOURCE == "web"' ## to prevent jobs from running when branch is created.
      when: never

build:
  stage: build
  before_script:
    - docker login -u "$DOCKER_REGISTRY_USER" -p "$DOCKER_REGISTRY_PASS" "$DOCKER_REGISTRY"
  script:
    - export BUILD_IMAGE="codebase-build:$CI_COMMIT_SHORT_SHA"
    - docker image inspect "$NODE_IMAGE" > /dev/null 2>&1 || docker pull "$NODE_IMAGE"
    - docker build --no-cache -f Dockerfile.build --build-arg NODE_IMAGE="$NODE_IMAGE" -t $BUILD_IMAGE .
    - docker run --rm -v $(pwd)/assets:/wiki/assets $BUILD_IMAGE
    - docker rmi $BUILD_IMAGE || true
  artifacts:
    paths:
      - assets/
    expire_in: 1 hour
  rules:
    # Run for feature branches on push OR if ENVIRONMENT is dev1 (manual trigger)
    - if: '$CI_COMMIT_BRANCH =~ /^(feature|task|hotfix|improvement|bugfix|docs)\// && $CI_PIPELINE_SOURCE == "push"'
      when: always
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: never
    - if: '$CI_COMMIT_BRANCH =~ /^(feature|task|hotfix|improvement|bugfix|docs)\// && $ENVIRONMENT == "dev1"'
      when: always


test:
  stage: test
  dependencies:
    - build
  before_script:
    - docker login -u "$DOCKER_REGISTRY_USER" -p "$DOCKER_REGISTRY_PASS" "$DOCKER_REGISTRY"
    - export TEST_IMAGE="codebase-test:$CI_COMMIT_SHORT_SHA"
    - docker build --no-cache -f Dockerfile.test --build-arg NODE_IMAGE="$NODE_IMAGE" -t $TEST_IMAGE .
  script:
    - docker run --rm -v $CI_PROJECT_DIR/coverage:/wiki/coverage $TEST_IMAGE
    - docker rmi $TEST_IMAGE || true
  artifacts:
    expire_in: 1 hour
    when: on_success
    paths:
      - coverage
  rules:
    - if: '$CI_COMMIT_BRANCH =~ /^(feature|task|hotfix|improvement|bugfix|docs)\// && $CI_PIPELINE_SOURCE == "push"'
      when: on_success
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: never
    - if: '$CI_COMMIT_BRANCH =~ /^(feature|task|hotfix|improvement|bugfix|docs)\// && $ENVIRONMENT == "dev1"'
      when: on_success

sonarqube-scan:
  stage: sonarqube
  dependencies:
    - test
  tags:
    - docker_runner
  image:
    name: sonarsource/sonar-scanner-cli:latest
    entrypoint: [""]
  variables:
    SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
    GIT_DEPTH: "0"
  cache:
    key: "${CI_JOB_NAME}"
    paths:
      - .sonar/cache
  script:
    - sonar-scanner
  # Run on feature branches only when there are commits
  rules:
    - if: '$CI_COMMIT_BRANCH =~ /^(feature|task|hotfix|improvement|bugfix|docs)\// && $CI_PIPELINE_SOURCE == "push"'
      when: always
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: never
    - if: '$CI_COMMIT_BRANCH =~ /^(feature|task|hotfix|improvement|bugfix|docs)\// && $ENVIRONMENT == "dev1"'
      when: on_success

docker-build:
  stage: docker-build
  before_script:
    - df -h
    - export PANDOC="$PANDOC"
    - bash scripts/set_image_tag.sh "$ENVIRONMENT" "$IMAGE_TAG"
  script:
    - bash scripts/build_images.sh
    - |
      if [ -f newimage.txt ]; then
        # Extract image tag for different branch types
        if [[ "$CI_MERGE_REQUEST_SOURCE_BRANCH_NAME" =~ ^hotfix/ ]] || [[ "$CI_COMMIT_BRANCH" =~ ^hotfix/ ]]; then
          echo "BUILT_IMAGE_TAG=$(cat newimage.txt | grep -o 'hotfix-[^[:space:]]*' | head -1 | sed 's/.*://')" >> build.env
        else
          # For dev2 or other branches, extract the appropriate tag
          TAG=$(cat newimage.txt | grep -oE '(dev2-[^[:space:]]*|[^[:space:]]*-[^[:space:]]*)' | head -1 | sed 's/.*://')
          echo "BUILT_IMAGE_TAG=${TAG}" >> build.env
        fi
        echo "Image built and tagged successfully. Content of newimage.txt:"
        cat newimage.txt
      fi
  artifacts:
    paths:
      - newimage.txt
    reports:
      dotenv: build.env
    expire_in: 15 days
  environment:
    name: $ENVIRONMENT
    url: $NEW_IMAGE
  rules:
    - if: '$CI_COMMIT_BRANCH =~ /^(feature|task|hotfix|improvement|bugfix|docs)\// && $ENVIRONMENT == "dev1"'
      when: always
    - if: $CI_COMMIT_BRANCH == "develop" || $ENVIRONMENT == "dev2"
      when: always
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME =~ /^hotfix\//'
      when: always
    - if: $ENVIRONMENT == "hotfix"
      when: always
    - if: $ENVIRONMENT == "production"
      when: never

push-docker-image:
  stage: docker-push
  needs:
   - docker-build
  script:
   - export PANDOC="$PANDOC"
   - bash scripts/push_images.sh
  rules:
    - if: '$CI_COMMIT_BRANCH =~ /^(feature|task|hotfix|improvement|bugfix|docs)\// && $ENVIRONMENT == "dev1"'
      when: on_success
    - if: $CI_COMMIT_BRANCH == "develop" || $ENVIRONMENT == "dev2"
      when: on_success
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME =~ /^hotfix\//'
      when: on_success
    - if: $ENVIRONMENT == "hotfix"
      when: on_success
    - if: $ENVIRONMENT == "production"
      when: never

  # Deploy to staging after merging develop into main
deploy-to-staging:
  stage: promote-prod-release-version
  needs:
    - job: docker-build
      optional: true
  script:
    - |
      echo "Promoting image to staging..."
      echo "DEBUG: Merge request source branch: '${CI_MERGE_REQUEST_SOURCE_BRANCH_NAME}'"
      echo "DEBUG: Built image tag: '${BUILT_IMAGE_TAG}'"
      echo "DEBUG: Commit message: '${CI_COMMIT_MESSAGE}'"
      # Detect hotfix branch using multiple methods
      if [[ "${CI_MERGE_REQUEST_SOURCE_BRANCH_NAME}" =~ ^hotfix/ ]] || [[ "${BUILT_IMAGE_TAG}" =~ ^hotfix- ]] || [[ "${CI_COMMIT_MESSAGE}" =~ hotfix ]]; then
        echo "Deploying hotfix branch image to staging..."
        if [ -n "${BUILT_IMAGE_TAG}" ]; then
          export HOTFIX_IMAGE_TAG="${BUILT_IMAGE_TAG}"
          echo "Using hotfix built image tag: ${HOTFIX_IMAGE_TAG}"
        else
          if [ -f newimage.txt ]; then
            source newimage.txt || true
            FALLBACK_TAG=$(echo "${NEW_IMAGE}" | awk -F':' '{print $2}')
            if [ -n "${FALLBACK_TAG}" ]; then
              export HOTFIX_IMAGE_TAG="${FALLBACK_TAG}"
              echo "Using fallback parsed tag from NEW_IMAGE: ${HOTFIX_IMAGE_TAG}"
            fi
          fi
        fi
        if [ -z "${HOTFIX_IMAGE_TAG}" ]; then
          echo "ERROR: Could not determine hotfix source image tag." >&2
          exit 1
        fi
        bash scripts/promote_hotfix_to_staging.sh
      else
        echo "Deploying dev2 branch image to staging..."
        if [ -n "${DEV2_IMAGE_TAG_OVERRIDE}" ]; then
          export DEV2_IMAGE_TAG="${DEV2_IMAGE_TAG_OVERRIDE}"
          echo "Using dev2 image (override): ${DEV2_IMAGE_TAG}"
        else
          if [ -f newimage.txt ]; then
            DERIVED_TAG=$(grep -o 'dev2-[^[:space:]]*' newimage.txt | head -1 | sed 's/.*://')
            if [ -n "${DERIVED_TAG}" ]; then
              export DEV2_IMAGE_TAG="${DERIVED_TAG}"
              echo "Using dev2 image (derived): ${DEV2_IMAGE_TAG}"
            fi
          fi
        fi
        if [ -z "${DEV2_IMAGE_TAG}" ]; then
          echo "ERROR: Unable to determine dev2 image tag." >&2
          exit 1
        fi
        bash scripts/promote_to_staging.sh
      fi
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: always

  # Deploy to production after staging, manual trigger
deploy-to-production:
  stage: promote-prod-release-version
  script:
    - echo "Deploying staging branch image to production..."
    - bash scripts/promote_to_prod.sh
  environment:
    name: production
  rules:
    # Manual for regular main merges
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
    # Auto for hotfix branches merged to main
    - if: $CI_COMMIT_BRANCH == "main" && $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME =~ /^hotfix\//
      when: always


