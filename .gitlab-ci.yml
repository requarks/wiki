variables:
  PROJECT_NAME: 'mar'
  APP_NAME: 'capwiki'
  DOCKER_REGISTRY: 'docker-registry-pt-support-shared.pl.s2-eu.capgemini.com'
  DEPLOY_USER: 'capwiki'
  TARGET_DIR: "/home/${DEPLOY_USER}/${PROJECT_NAME}"
  IMAGE: '${DOCKER_REGISTRY}/${PROJECT_NAME}/${APP_NAME}'
  STAGING_IMAGE_TAG: 'latest-staging'

  ENVIRONMENT:
    value: "none"
    options:
      - "none"
      - "dev1"
      - "dev2"
      - "staging"
      - "production"
    description: "Choose on which environment should pipeline run"
  MONITORING:
    value: "no"
    options:
      - "yes"
      - "no"
    description: "Deploy monitoring"
  VERSION:
    value: "1.0.0"
    description: "Specify the version [ONLY USED FOR STAGING or PRODUCTION]"
  MESSAGE:
    value: ""
    description: "Specify a tagging message [ONLY USED FOR STAGING or PRODUCTION]"
  CONTAINER_SCANNING:
    value: "false"
    options:
      - "true"
      - "false"
    description: "Choose true if you want to scan the images"
  SONARQUBE:
    value: "true"
    options:
      - "true"
      - "false"
    description: "Choose false to skip code quality check"


default:
  tags:
    - runner_mar
  before_script:
    - mkdir -p ~/.npm-global
    - npm config set prefix '~/.npm-global'
    - export PATH=$HOME/.npm-global/bin:$PATH
    - npm install -g yarn
    - node -v && npm -v && yarn -v

stages:
  - build
  - test
  - sonarqube
  - container-scan
  - modify_package_json #Need to remove this stage when MAR-444 task is done.
  - docker-build
  - docker-push
  - deployment-pipeline
  - tagging  

build:
 stage: build
 script:
    - yarn cache clean
    - rm -rf node_modules
    - yarn install --frozen-lockfile
    - yarn build
 rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" || $CI_COMMIT_BRANCH == "main" || $ENVIRONMENT == "production"
      when: never
    - when: on_success

test:
  stage: test
  dependencies:
    - build
  script:
    - yarn add jest-junit --dev
    - yarn jest --coverage # Run tests
    ## Below cmnds can be run after fixing lint errors in the codebase
    #- yarn eslint --ext .js,.vue .
    # - yarn pug-lint server/views
  artifacts:
    expire_in: 1 hr
    when: on_success
    paths:
      - coverage
      - test-results
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" || $CI_COMMIT_BRANCH == "main" || $ENVIRONMENT == "production"
      when: never
    - when: on_success

sonarqube-scan:
  stage: sonarqube
  dependencies:
    - test
  tags:
    - docker_runner
  image:
    name: sonarsource/sonar-scanner-cli:latest
    entrypoint: [""]
  variables:
    SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"  # Defines the location of the analysis task cache
    GIT_DEPTH: "0"  # Tells git to fetch all the branches of the project, required by the analysis task
  cache:
    key: "${CI_JOB_NAME}"
    paths:
      - .sonar/cache
  script:
    - sonar-scanner
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $ENVIRONMENT == "production" || $CI_PIPELINE_SOURCE == "schedule"
      when: never
    - if: $SONARQUBE == "true"
      when: on_success

container_scanning:
  stage: container-scan
  trigger:
    include: deployment/pipelines/scanning/scanning.yaml
    strategy: depend
    forward:
      pipeline_variables: true
  rules:
    - if: $CONTAINER_SCANNING == "false" || $CI_COMMIT_BRANCH == "main" || $ENVIRONMENT == "production"
      when: never
    - if: $CONTAINER_SCANNING == "true" || $CI_PIPELINE_SOURCE == "schedule"
      when: always

modify_package_json:
  stage: modify_package_json
  image: node:alpine
  before_script:
    # Make the scripts executable
    - chmod +x ./modify-app-dev-mode.js
    - chmod +x ./modify-app-releasedate-version.js
  script:
    - echo "Modify package json i.e release date and version"
    # This node.js script will run in all environments
    - node ./modify-app-releasedate-version.js "$VERSION"

    # Conditionally run this script only in staging or production environments
    - |
      if [[ "$ENVIRONMENT" == "staging" || "$ENVIRONMENT" == "production"  || $CI_COMMIT_REF_NAME == "develop" || ($CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "develop" && $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME =~ ^(feature|task|hotfix|improvement|bugfix|docs)\/ ) ]]; then
        echo "Modify package json dev mode to false for $ENVIRONMENT"
        node ./modify-app-dev-mode.js false
      else
        echo "Skipping modify-app-dev-mode.sh in non-staging/non-production environments"
      fi

    # Confirm the changes
    - cat package.json | grep -E '"version"|"releaseDate"|"dev"' | sed 's/[",]//g'
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" || $CI_COMMIT_BRANCH == "main" || $ENVIRONMENT == "production"
      when: never
    - when: always
  # Artifacts to persist changes for later stages
  artifacts:
    paths:
      - package.json


build-docker-image:
  stage: docker-build
  before_script:
    - |
      docker login -u "$DOCKER_REGISTRY_USER" -p "$DOCKER_REGISTRY_PASS" "$DOCKER_REGISTRY"

       if [[ -z "$ENVIRONMENT" || "$ENVIRONMENT" == "none" ]]; then
        if [[ "$CI_COMMIT_BRANCH" == "develop" ||  "$CI_MERGE_REQUEST_TARGET_BRANCH_NAME" = "develop"  ||  "$CI_MERGE_REQUEST_SOURCE_BRANCH_NAME" =~ ^(feature|task|hotfix|improvement|bugfix|docs)/  ]]; then
          ENVIRONMENT="staging"
        elif [[ "$CI_MERGE_REQUEST_TARGET_BRANCH_NAME" == "main" && "$CI_MERGE_REQUEST_SOURCE_BRANCH_NAME" == "develop" ]]; then
          ENVIRONMENT="production"
        fi
      fi

      echo "Building Docker image for environment: $ENVIRONMENT"

      if [[ "$ENVIRONMENT" == "dev1" || "$ENVIRONMENT" == "dev2" || $CI_COMMIT_BRANCH =~ ^(feature|task|hotfix|improvement|bugfix|docs)/  ]]; then
        IMAGE_TAG="$CI_COMMIT_SHORT_SHA"
      elif [[ "$ENVIRONMENT" == "staging" ]]; then
        IMAGE_TAG="$STAGING_IMAGE_TAG"
        #IMAGE_TAG="$VERSION-staging"
      fi
      # Fallback if IMAGE_TAG is still empty
      if [[ -z "$IMAGE_TAG" ]]; then
        echo "ERROR: IMAGE_TAG is empty. Cannot proceed."
        exit 1
      elif [[ -n "$IMAGE_TAG" ]]; then
        # Log the IMAGE_TAG value
        echo "IMAGE_TAG is set to: $IMAGE_TAG"
      fi
      export NEW_IMAGE="${IMAGE}:$IMAGE_TAG"
      echo "Constructed NEW_IMAGE: $NEW_IMAGE"
  script:
    - echo "Building Docker image"
    - docker build --no-cache -f Dockerfile -t "$NEW_IMAGE" .
    - echo "NEW_IMAGE=$NEW_IMAGE" > newimage.txt
  artifacts:
    paths:
      - newimage.txt
    expire_in: 1 hour  # Expires 1 minute after the pipeline finishes
  environment:
    name: $ENVIRONMENT
    url: $NEW_IMAGE
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" || $CI_COMMIT_BRANCH == "main" || $ENVIRONMENT == "production"
      when: never
    - when: always

push-docker-image:
  stage: docker-push
  needs:
    - build-docker-image
  before_script:
    - docker login -u "$DOCKER_REGISTRY_USER" -p "$DOCKER_REGISTRY_PASS" "$DOCKER_REGISTRY"
  script:
    - source newimage.txt
    - echo "Pushing Docker image"
    - docker push $NEW_IMAGE
    - docker logout $DOCKER_REGISTRY
    - docker rmi $NEW_IMAGE
    - rm newimage.txt
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" || $CI_COMMIT_BRANCH == "main" || $ENVIRONMENT == "production"
      when: never
    - when: on_success

dev1-pipeline:
  stage: deployment-pipeline
  trigger:
    include: deployment/pipelines/development-dev1/.gitlab-ci.yml
    strategy: depend
    forward:
      pipeline_variables: true
  rules:
    - if: $ENVIRONMENT == "dev1" && $CI_COMMIT_REF_NAME =~ /^(feature|task|hotfix|improvement|bugfix|docs)\//
      when: manual

dev2-pipeline:
  stage: deployment-pipeline
  trigger:
    include: deployment/pipelines/development-dev2/.gitlab-ci.yml
    strategy: depend
    forward:
      pipeline_variables: true
  rules:
    - if: $ENVIRONMENT == "dev2" && $CI_COMMIT_REF_NAME =~ /^(feature|task|hotfix|improvement|bugfix|docs)\//
      when: manual


staging-pipeline:
  stage: deployment-pipeline
  trigger:
    include: deployment/pipelines/staging/.gitlab-ci.yml
    strategy: depend
    forward:
      pipeline_variables: true
  variables:
    ENVIRONMENT: "staging"
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: never
    - if: ($ENVIRONMENT == "staging" && $CI_COMMIT_REF_NAME == "develop") || $CI_COMMIT_REF_NAME == "develop" || ($CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "develop" && $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME =~ /^(feature|task|hotfix|improvement|bugfix|docs)\// )
      when: on_success


prod-pipeline:
  stage: deployment-pipeline
  trigger:
    include: deployment/pipelines/production/.gitlab-ci.yml
    strategy: depend
    forward:
      pipeline_variables: true
  variables:
    ENVIRONMENT: "production"
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: never
    - if:  ($ENVIRONMENT == "production"  && $CI_COMMIT_REF_NAME == "main" ) || ($CI_MERGE_REQUEST_SOURCE_BRANCH_NAME == "develop" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main")
      when: on_success
