variables:
  PROJECT_NAME: 'mar'
  ENVIRONMENT:
    value: "none"
    options:
      - "none"
      - "dev1"
      - "dev2"
      - "staging"
      - "production"
    description: "Choose on which environment should pipeline run"
  APP_NAME: 'capwiki'
  DOCKER_REGISTRY: 'docker-registry-pt-support-shared.pl.s2-eu.capgemini.com'
  DEPLOY_USER: 'capwiki'
  TARGET_DIR: "/home/${DEPLOY_USER}/${PROJECT_NAME}"
  IMAGE: '${DOCKER_REGISTRY}/${PROJECT_NAME}/${APP_NAME}'
  PANDOC_IMAGE: '${DOCKER_REGISTRY}/${PROJECT_NAME}/pandoc'
  NODE_IMAGE: '${DOCKER_REGISTRY}/${PROJECT_NAME}/node:20-alpine'
  DEV2_IMAGE_TAG: "dev2-${VERSION}"
  STAGING_IMAGE_TAG: "latest-staging"
  PRODUCTION_IMAGE_TAG: "${VERSION}"
  STAGING_IMAGE: "${IMAGE}:latest-staging"
  ALLOWED_BRANCH_PREFIXES: '/^(feature|task|hotfix|improvement|bugfix|docs)\/'
  GIT_DEPTH: "0"


  IMAGE_TAG:
    value: ""
    description: "Specify the image tag for dev, use MAR-<Jira-ticket-nr> for staging (ignore i.e has default value latest-staging), for prod, use tags ex. 1.0.0 etc"

  SONARQUBE:
    value: "true"
    options:
      - "true"
      - "false"
    description: "Choose false to skip code quality check"
 
  PANDOC:
    value: "false"
    options:
      - "true"
      - "false"
    description: "Choose false to skip build & push pandoc docker image stages"

  VERSION:
    value: "1.9.2"
    description: "Update to next release version, it should be numeric value, ex: 1.7.5"


default:
  tags:
    - ubuntu-docker
  before_script:
     - apt-get update && apt-get install -y nodejs npm
     - source scripts/setup_yarn.sh
stages:
  - environment-set
  - build
  - test
  - sonarqube
  - docker-build
  - docker-push #when this stage "docker push image" is success then argocd will do pull strategy to automate k8s cluster deployment based on docker image tag value
  - promote-prod-release-version # promote to production


environment-set:
  stage: environment-set
  script:
    - echo "environment used for this pipeline is ${ENVIRONMENT}"
  environment:
    name: ${ENVIRONMENT}
  # Run only on the following branches when there are commits (not just branch creation)
  rules:
    - if: '$CI_COMMIT_BRANCH =~ /^(feature|task|hotfix|improvement|bugfix|docs)\// && $CI_PIPELINE_SOURCE == "push"'
      when: always
    # - if: '$ENVIRONMENT == "dev1"'
    #   when: always
    # - if: $CI_COMMIT_BRANCH == "develop"
    #   when: always
    - if: '$CI_PIPELINE_SOURCE == "web"' ## to prevent jobs from running when branch is created.
      when: never


build:
  stage: build
  before_script:
    - docker login -u "$DOCKER_REGISTRY_USER" -p "$DOCKER_REGISTRY_PASS" "$DOCKER_REGISTRY"
  script:
    - export BUILD_IMAGE="codebase-build:$CI_COMMIT_SHORT_SHA"
    - echo "NODE_IMAGE is $NODE_IMAGE"
    - docker image inspect "$NODE_IMAGE" > /dev/null 2>&1 || docker pull "$NODE_IMAGE"
    - docker build --no-cache -f Dockerfile.build --build-arg NODE_IMAGE="$NODE_IMAGE" -t $BUILD_IMAGE .
    - docker run --rm -v $(pwd)/assets:/wiki/assets $BUILD_IMAGE
    - docker rmi $BUILD_IMAGE || true
  artifacts:
    paths:
      - assets/
    expire_in: 1 hour
  rules:
    - if: '$CI_COMMIT_BRANCH =~ /^(feature|task|hotfix|improvement|bugfix|docs)\// && $CI_PIPELINE_SOURCE == "push"'
      when: always
    # - if: '$ENVIRONMENT == "dev1"'
    #   when: always
    # - if: $CI_COMMIT_BRANCH == "develop"
    #   when: always
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: never

test:
  stage: test
  dependencies:
    - build
  before_script:
    - docker login -u "$DOCKER_REGISTRY_USER" -p "$DOCKER_REGISTRY_PASS" "$DOCKER_REGISTRY"
    - export TEST_IMAGE="codebase-test:$CI_COMMIT_SHORT_SHA"
    - docker build --no-cache -f Dockerfile.test --build-arg NODE_IMAGE="$NODE_IMAGE" -t $TEST_IMAGE .
  script:
    - docker run --rm -v $CI_PROJECT_DIR/coverage:/wiki/coverage $TEST_IMAGE
    - docker rmi $TEST_IMAGE || true
  artifacts:
    expire_in: 1 hour
    when: on_success
    paths:
      - coverage
  rules:
    - if: '$CI_COMMIT_BRANCH =~ /^(feature|task|hotfix|improvement|bugfix|docs)\// && $CI_PIPELINE_SOURCE == "push"'
      when: on_success
    # - if: '$ENVIRONMENT == "dev1"'
    #   when: on_success
    # - if: $CI_COMMIT_BRANCH == "develop"
    #   when: always
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: never


sonarqube-scan:
  stage: sonarqube
  dependencies:
    - test
  tags:
    - docker_runner
  image:
    name: sonarsource/sonar-scanner-cli:latest
    entrypoint: [""]
  variables:
    SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
  cache:
    key: "${CI_JOB_NAME}"
    paths:
      - .sonar/cache
  script:
    - sonar-scanner
  # Run on feature branches only when there are commits
  rules:
    - if: '$CI_COMMIT_BRANCH =~ /^(feature|task|hotfix|improvement|bugfix|docs)\// && $CI_PIPELINE_SOURCE == "push"'
      when: always
    # - if: '$ENVIRONMENT == "dev1"'
    #   when: always
    # - if: $CI_COMMIT_BRANCH == "develop"
    #   when: always
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: never

docker-build:
  stage: docker-build
  before_script:
    - df -h
    - export PANDOC="$PANDOC"
    - bash scripts/set_image_tag.sh "$ENVIRONMENT" "$IMAGE_TAG" "$VERSION"
  script:
    - bash scripts/build_images.sh
    - |
      if [ -f newimage.txt ]; then
        echo "BUILT_IMAGE_TAG=$(cat newimage.txt | grep -o 'dev2-[^[:space:]]*' | head -1 | sed 's/.*://')" >> build.env
      fi
  artifacts:
    paths:
      - newimage.txt
    reports:
      dotenv: build.env
    expire_in: 15 days
  environment:
    name: $ENVIRONMENT
    url: $NEW_IMAGE
  rules:
    - if: '$CI_COMMIT_BRANCH =~ /^(feature|task|hotfix|improvement|bugfix|docs)\// && $ENVIRONMENT == "dev1"'
      when: always
    - if: '$CI_COMMIT_BRANCH =~ /^(hotfix|bugfix)\// && $CI_PIPELINE_SOURCE == "push"'
      when: on_success
    - if: $CI_COMMIT_BRANCH == "develop" || $ENVIRONMENT == "dev2"
      when: always



#  Docker image push to registry
push-docker-image:
  stage: docker-push
  needs:
  - job: docker-build
    artifacts: true
    optional: true
  before_script:
      - |
          # Dynamically set ENVIRONMENT based on branch if not already set
          if [ -z "$ENVIRONMENT" ] || [ "$ENVIRONMENT" = "none" ]; then
            if [ "$CI_COMMIT_BRANCH" = "develop" ]; then
              export ENVIRONMENT="dev2"
            elif [ "$CI_COMMIT_BRANCH" = "main" ]; then
              export ENVIRONMENT="staging"
            fi
          fi
          if [ -z "$ENVIRONMENT" ] || [ "$ENVIRONMENT" = "none" ]; then
            echo "ERROR: ENVIRONMENT variable is not set or is 'none'. Please set ENVIRONMENT to a valid value (e.g., dev1, dev2, staging, production)." >&2
            exit 1
          fi
          if [ -z "$IMAGE_TAG" ]; then
            export IMAGE_TAG="${ENVIRONMENT}-$CI_COMMIT_SHORT_SHA"
          fi
      - echo "Using ENVIRONMENT=$ENVIRONMENT"
      - echo "Using VERSION=$VERSION"
      - echo "Using IMAGE_TAG=$IMAGE_TAG"
      - export PANDOC="$PANDOC"
  script:
     - "if [ -z '$VERSION' ]; then echo 'ERROR: VERSION is not set!'; exit 1; fi"
     - "bash scripts/push_images.sh --no-cleanup"
     - |
         if [ "$ENVIRONMENT" = "dev2" ]; then
           docker tag "$IMAGE:$IMAGE_TAG" "$IMAGE:dev-latest"
           docker login -u "$DOCKER_REGISTRY_USER" -p "$DOCKER_REGISTRY_PASS" "$DOCKER_REGISTRY"
           docker push "$IMAGE:dev-latest"
           docker rmi "$IMAGE:dev-latest" || true
         fi
     - "docker rmi \"$IMAGE:$IMAGE_TAG\" || true"
  environment:
    name: $ENVIRONMENT
  rules:
    - if: '$CI_COMMIT_BRANCH =~ /^(feature|task|hotfix|improvement|bugfix|docs)\// && $ENVIRONMENT == "dev1"'
      when: on_success
    - if: '$ENVIRONMENT == "dev1"'
      when: always
    - if: '$CI_PIPELINE_SOURCE == "web"' # to prevent jobs from running when branch is created.
      when: never
    - if: $CI_COMMIT_BRANCH == "develop" || $ENVIRONMENT == "dev2"
      when: on_success



# Promote dev2 image to staging
deploy-to-staging:
  stage: promote-prod-release-version
  needs:
    - job: docker-build
      artifacts: true
      optional: true
  before_script:
     - "if [ -f build.env ]; then source build.env; fi"
     - "echo 'Using VERSION from dev2 build: $VERSION'"
  script:
    - echo 'Retagging dev2-latest as staging image...'
    - |
      docker login -u "$DOCKER_REGISTRY_USER" -p "$DOCKER_REGISTRY_PASS" "$DOCKER_REGISTRY"
      DEV_TAG="dev-latest"
      STAGING_TAG="latest-staging"
      docker pull "$IMAGE:$DEV_TAG"
      docker tag "$IMAGE:$DEV_TAG" "$IMAGE:$STAGING_TAG"
      docker push "$IMAGE:$STAGING_TAG"
    - echo 'Deploying staging image...'
    - bash scripts/promote_to_staging.sh
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: always
    - if: $CI_COMMIT_BRANCH == "main" && ($CI_MERGE_REQUEST_SOURCE_BRANCH_NAME =~ /^bugfix\// || $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME =~ /^hotfix\//)
      when: always


deploy-to-production:
  stage: promote-prod-release-version
  needs:
    - job: docker-build
      artifacts: true
      optional: true
  before_script:
     - "if [ -f build.env ]; then source build.env; fi"
     - "echo 'Using VERSION from dev2 build: $VERSION'"
  script:
    - echo 'Retagging staging image as production image...'
    - |
        docker login -u "$DOCKER_REGISTRY_USER" -p "$DOCKER_REGISTRY_PASS" "$DOCKER_REGISTRY"
        STAGING_TAG="latest-staging"
        PROD_TAG="$VERSION"
        docker pull "$IMAGE:$STAGING_TAG"
        docker tag "$IMAGE:$STAGING_TAG" "$IMAGE:$PROD_TAG"
        docker push "$IMAGE:$PROD_TAG"
    - echo 'Deploying production image...'
    - bash scripts/promote_to_prod.sh
  environment:
    name: production
  rules:
    # Manual for regular main merges
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
    # Auto for bugfix/hotfix merges into main
    - if: $CI_COMMIT_BRANCH == "main" && ($CI_MERGE_REQUEST_SOURCE_BRANCH_NAME =~ /^bugfix\// || $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME =~ /^hotfix\//)
      when: always
